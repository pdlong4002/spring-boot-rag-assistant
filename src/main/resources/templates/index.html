<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RAGStone</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>

    <!-- Highlight.js stylesheet for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">

    <!-- MathJax config moved to external static JS to avoid Thymeleaf parsing issues -->
    <!-- MathJax core will be loaded below (after config) -->
</head>
<body>

<div class="app">

    <!-- ── Left Sidebar ── -->
    <aside class="sidebar">

        <!-- Logo + New Chat -->
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">R</div>
                <span class="logo-text">RAG<span class="logo-accent">Stone</span></span>
            </div>
            <button class="new-chat-btn" onclick="newChat()" title="Start a new conversation">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New
            </button>
        </div>

        <!-- Conversation list -->
        <div class="conv-list" id="convList">
            <div class="conv-empty">No conversations yet</div>
        </div>

        <!-- Knowledge Base (collapsible) -->
        <div class="sidebar-knowledge">
            <button class="knowledge-toggle" onclick="toggleKnowledge(this)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                Knowledge Base
                <svg class="arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="knowledge-body" id="knowledgeBody">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" multiple hidden
                           accept=".pdf,.docx,.doc,.txt,.xlsx,.csv,.html,.rtf,.png,.jpg,.jpeg,.webp,.gif"/>
                    <div class="drop-icon-sm">↑</div>
                    <div class="drop-label">Drop files or click to browse</div>
                    <div class="drop-sub">PDF · DOCX · XLSX · PNG · JPG</div>
                </div>

                <div class="progress-bar-wrap" id="progressBarWrap" style="display:none">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-label" id="progressLabel"></span>
                </div>

                <ul class="file-list-sm" id="fileList"></ul>
            </div>
        </div>

    </aside>

    <!-- ── Main Chat Area ── -->
    <main class="main">

        <!-- Chat header removed: sidebar now manages rename/delete actions -->

        <!-- Messages -->
        <div class="messages" id="messages"></div>

        <!-- Input bar -->
        <div class="input-area">
            <div class="input-box">
                <button class="attach-btn" id="uploadTrigger" title="Upload file to knowledge base">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <textarea id="messageInput" class="message-input"
                          placeholder="Ask me anything..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" title="Send (Enter)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="input-hint"><kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line · history saved in MySQL</p>
        </div>

    </main>
</div>

<!-- highlight.js and MathJax config + core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="/js/mathjax-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script th:src="@{/js/app.js}"></script>

<!-- Initialize highlighting on page load (safely) -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (window.hljs && hljs.highlightAll) {
            try { hljs.highlightAll(); } catch (e) { /* ignore */ }
        }
    });
</script>
</body>
</html>
