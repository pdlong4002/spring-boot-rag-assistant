spring:
  main:
    allow-bean-definition-overriding: true

  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

  ai:
    openai:
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      api-key: ${GEMINI_API_KEY}
      chat:
        options:
          model: gemini-2.5-flash
      embedding:
        enabled: false

    vectorstore:
      redis:
        uri: redis://localhost:6379
        index: rag-index
        initialize-schema: true
        embedding-dimension: 384

    # Ensure the correct property path for the JDBC chat memory initializer (and keep it disabled)
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:h2:file:./data/chatdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
